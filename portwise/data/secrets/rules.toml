title = "PortWise web secret rules"

[[rules]]
id = "aws-access-key-id"
description = "AWS access key id"
regex = '''\bAKIA[0-9A-Z]{16}\b'''
secretGroup = 0
entropy = 3.0
keywords = ["AKIA", "AWS"]

[[rules]]
id = "aws-secret-access-key"
description = "AWS secret access key"
regex = '''(?i)\baws[_-]?secret[_-]?access[_-]?key\b[^A-Za-z0-9/+=]{0,20}([A-Za-z0-9/+=]{40})\b'''
secretGroup = 1
entropy = 3.5
keywords = ["aws", "secret", "key"]

[[rules]]
id = "github-token"
description = "GitHub token"
regex = '''\bgh[pousr]_[A-Za-z0-9_]{36,255}\b'''
secretGroup = 0
entropy = 3.0
keywords = ["github", "token", "ghp_", "gho_", "ghu_", "ghs_", "ghr_"]

[[rules]]
id = "slack-token"
description = "Slack token"
regex = '''\bxox[baprs]-[A-Za-z0-9-]{10,120}\b'''
secretGroup = 0
entropy = 2.8
keywords = ["slack", "token", "xox"]

[[rules]]
id = "google-api-key"
description = "Google API key"
regex = '''\bAIza[0-9A-Za-z\-_]{35}\b'''
secretGroup = 0
entropy = 3.0
keywords = ["google", "api", "key", "AIza"]

[[rules]]
id = "stripe-live-key"
description = "Stripe live API key"
regex = '''\bsk_live_[A-Za-z0-9]{24,}\b'''
secretGroup = 0
entropy = 3.2
keywords = ["stripe", "live", "key", "sk_live_"]

[[rules]]
id = "jwt"
description = "JWT token"
regex = '''\beyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\b'''
secretGroup = 0
entropy = 3.0
keywords = ["bearer", "jwt", "token", "authorization", "eyJ"]

[[rules]]
id = "private-key-block"
description = "Private key block"
regex = '''-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'''
secretGroup = 0
entropy = 0
keywords = ["private key", "BEGIN"]

[[rules]]
id = "azure-client-secret"
description = "Azure AD client secret"
regex = '''(?i)\bclient[_-]?secret\b[^A-Za-z0-9/+=]{0,20}([A-Za-z0-9/+=]{32,})\b'''
secretGroup = 1
entropy = 3.4
keywords = ["client", "secret", "azure", "oauth"]

[[rules]]
id = "generic-api-token"
description = "Generic API token assignment"
regex = '''(?i)\b(?:api[_-]?key|api[_-]?token|access[_-]?token|auth[_-]?token|client[_-]?secret|secret[_-]?key)\b[^A-Za-z0-9/+=]{0,20}([A-Za-z0-9/+=\-_]{16,})\b'''
secretGroup = 1
entropy = 3.6
keywords = ["api", "token", "secret", "key", "auth"]
