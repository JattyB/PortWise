# PortWise example configuration.
#
# The operator controls assessment depth ('recon' = fast enumeration, 'full' =
# complete active assessment) and scope (intrusive or credentialed actions are
# explicit opt-in per engagement). Run only against systems you are authorized
# to assess.

project:
  name: PortWise Assessment
  context: unknown
  authorized_use_only: true

scanner:
  nmap_timeout_seconds: 1800
  timeout: 5
  default_dry_run: true
  output_dir: scans
  # Assessment depth: 'recon' = fast enumeration, 'full' = complete active
  # assessment. Profiles may override; the CLI --validation-level wins over both.
  validation_level: recon
  internet_facing: false

  # TCP scan behavior. SYN scans fall back to TCP connect scans when the local
  # user does not have the privileges required by Nmap.
  tcp_syn_scan_when_privileged: true
  tcp_top_ports: 1000
  tcp_full_scan: true
  # Native async TCP connect fallback used when nmap is missing or forced off.
  force_native_connect_scan: false
  native_connect_scan_ports: [21, 22, 23, 25, 53, 80, 110, 139, 143, 389, 443, 445, 465, 587, 636, 993, 995, 1010, 1011, 1012, 1433, 1521, 3306, 3389, 5432, 5900, 6379, 8080, 8443]
  native_connect_scan_timeout: 1.5
  native_connect_scan_concurrency: 256

  # Module execution concurrency. Module checks run in parallel across hosts
  # (work for any single host stays serialized to preserve per-host throttle).
  # Override per run with --concurrency.
  module_concurrency: 10

  # UDP service detection is intentionally limited to confirmed open UDP ports
  # unless this is explicitly enabled.
  udp_top_1000: true
  udp_service_detection_on_open_filtered: false

  tls_expiry_days: 30
  tls:
    # Default TLS path checks certs, chain/hostname, deprecated protocols,
    # weak cipher families, weak DH, and HSTS. Full per-cipher inventory is
    # heavier and intended for full-depth TLS review.
    native_full_enumeration: false
    native_enum_max_ciphers_per_version: 128
  snmp_default_community_check: true
  ftp_anonymous_check: true

  # Read-only native fallbacks used when nmap NSE evidence is unavailable.
  # ssh_algo_probe: perform an SSH KEXINIT handshake to enumerate weak
  #   KEX/cipher/MAC/host-key algorithms (no authentication).
  # smb_native_probe: perform an SMB NEGOTIATE handshake to detect SMBv1
  #   support and message-signing posture (no authentication, no tree connect).
  # -Pn behaviour: treat every supplied target as live (port-scan hosts even if
  # they block ICMP). Default on; disable for very large ranges.
  assume_hosts_up: true
  # Web crawl: same-origin GET-only crawl for endpoints/JS/secrets on web ports.
  web_crawl:
    enabled: true
    max_pages: 8
    max_js: 10
    concurrency: 5
    max_retries: 0
    time_budget_seconds: 60
  # Aggregate native web-stage budget per host. Non-deep default runs stop
  # cleanly at this boundary and persist the completed/capped stage table.
  web_per_host_budget_seconds: 300
  web_safe_path_concurrency: 10
  web_safe_path_budget_seconds: 60
  ssh_algo_probe: true
  smb_native_probe: true

smb:
  # Unauthenticated SMB session/share/metadata enumeration through impacket.
  # This complements the native SMB NEGOTIATE probe; no credentials are sent.
  impacket_enum: true
  timeout: 5

ldap:
  # Anonymous LDAP bind/object enumeration through impacket where the directory
  # permits it. Credentials are never used unless authenticated: true.
  anonymous_enum: true
  timeout: 5
  base_dn: ""

http_politeness:
  min_delay_seconds: 0.5
  jitter_seconds: [0.1, 0.4]
  max_retries: 2
  backoff_base_seconds: 1.0
  backoff_max_seconds: 30.0
  circuit_breaker_threshold: 3
  max_requests_per_host: 30
  respect_retry_after: true

http_transport:
  # curl_cffi impersonation profile. The generic "chrome" alias tracks the
  # latest Chrome fingerprint shipped by curl_cffi.
  browser_profile: chrome
  browser_profiles: [chrome]
  rotate_profiles: false
  max_concurrency: 10
  max_redirects: 5
  max_body_bytes: 1048576
  verify_tls: false
  playwright_fallback: true
  # Optional upstream proxy. Supports HTTP and SOCKS proxy URLs; use
  # http://127.0.0.1:8080 for Burp.
  proxy: ""
  # proxies:
  #   http: "http://127.0.0.1:8080"
  #   https: "http://127.0.0.1:8080"

web_template_engine:
  enabled: true
  include_packaged: true
  timeout: 8
  # Template sweeps are I/O-bound and use their own higher concurrency and
  # request budget instead of crawler limits. Politeness still applies through
  # the shared curl_cffi transport.
  concurrency: 50
  max_requests_per_host: 2500
  min_delay_seconds: 0.02
  jitter_min_seconds: 0.0
  jitter_max_seconds: 0.03
  time_budget_seconds: 120
  selection:
    enabled: true
    # Default runs include stack-matched templates plus a small critical
    # exposure tier. Use `portwise scan --deep` or set deep: true to include the
    # larger generic CVE/misconfiguration tier.
    generic_always_on: true
    deep: false

http:
  max_redirects: 3
  max_body_bytes: 262144
  safe_paths:
    - /.git/HEAD
    - /.env
    - /server-status
    - /phpinfo.php
    - /swagger-ui/
    - /swagger.json
    - /v2/api-docs
    - /actuator/health
    - /actuator/env
    - /admin
    - /login
    - /manager/html

# Optional external web engines. Run only at 'full' depth, only when the binary
# is on PATH; when absent PortWise skips and emits the equivalent handoff command.
web_engines:
  enabled: true
  nuclei:
    enabled: true
    timeout: 600
    severity: ""          # e.g. "critical,high,medium" to limit templates
    extra_args: []
  ffuf:
    enabled: true
    timeout: 600
    # Point at a SecLists (or other) wordlist to enable ffuf content discovery.
    # Without a valid wordlist path ffuf is skipped with a handoff command.
    wordlist: ""
    match_codes: ""       # e.g. "200,204,301,302,307,401,403"; default ffuf -ac calibration
    extra_args: []

# Optional screenshot evidence via Playwright. Runs at 'full' depth when the
# portwise[screenshots] extra is installed; image paths are attached to web
# findings and the POC bundle. Missing extras skip cleanly.
screenshots:
  enabled: true
  playwright:
    enabled: true
    timeout: 30
    wait_until: domcontentloaded
    full_page: true
    width: 1366
    height: 768
    ignore_https_errors: true

cve:
  enabled: true
  nvd_enabled: true
  kev_enabled: true
  epss_enabled: true
  cache_dir: cache/cve
  timeout: 10
  nvd_api_key_env: PORTWISE_NVD_API_KEY
  # False-positive controls (recommended defaults shown):
  #   include_keyword_only: emit CVEs that only matched an NVD keyword search with
  #     no CPE/version confirmation. These were the biggest source of noise, so
  #     they are suppressed by default. Set true only when triaging manually.
  #   collapse_version_unknown: fold product-matched-but-version-unconfirmed CVEs
  #     into a single "needs manual validation" finding per service.
  include_keyword_only: false
  collapse_version_unknown: true

# Cross-reference version-matched CVEs with public exploit availability. Local
# lookups only (no network): packaged ExploitDB CSV and nuclei template presence.
exploit_intel:
  enabled: true
  exploitdb: true
  # Optional compatibility path; not required for full capability.
  searchsploit: false
  nuclei_templates: true
  # Override packaged ExploitDB CSV if you maintain a newer local sync.
  exploitdb_csv: ""
  # Override the nuclei-templates directory (else ~/nuclei-templates or $NUCLEI_TEMPLATES).
  nuclei_templates_dir: ""

reports:
  formats:
    - json
    - excel
    - html
    - csv

progress:
  enabled: true
  write_progress_file: true
  show_current_command: true
  show_latest_output_line: false

dns:
  recursion_check: true
  zone_transfer_check: true
  zones: []

snmp:
  default_community_check: true
  communities:
    - public
    - private
  max_oids: 3
  timeout_seconds: 3
  # Write-community check: a non-destructive sysName.0 round-trip SET (reads the
  # value, writes the same value back) to confirm write access. Active write; runs
  # only at 'full' depth AND when enabled here. Off by default (scope control).
  write_check: false

ntp:
  timeout_seconds: 3

database:
  unauthenticated_checks: true
  timeout_seconds: 4
  max_response_bytes: 4096

mail:
  timeout_seconds: 4
  open_relay_check: false

imports:
  testssl_json_enabled: true
  nessus_csv_enabled: true

cache:
  enabled: true
  directory: cache

# Authenticated assessment (operator opt-in, full depth only). Master switch off
# by default. Supply credentials here or via --cred/--cred-file. Only the creds you
# provide are used — PortWise never brute forces or guesses.
authenticated: false
credentials: []
  # - service: web          # web/http: Basic auth + form login
  #   username: admin
  #   password: admin
  #   login_url: /login
  #   username_field: username
  #   password_field: password
  # - service: smb          # authenticated SMB/AD checks via impacket
  #   username: svc_account
  #   password: "REDACTED"
  #   domain: CORP
  # - service: snmp         # community used as an SNMP credential
  #   community: "REDACTED"

safety:
  no_bruteforce: true
  no_exploitation: true
  no_write_operations: true
  max_response_bytes: 4096

profiles:
  quick-triage:
    description: Fast, low-noise service discovery and HTTP/TLS hygiene checks (recon depth).
    context: unknown
    nmap_steps:
      - discovery
      - tcp_top_1000
    modules:
      tls: true
      http: true
      exposure: true
      plaintext: true
      smb_safe: false
      ldap: false
      ssh: true
      rdp: true
      winrm: true
      ftp: true
      snmp: true
      dns: true
      ntp: true
      database: true
      devops: true
      kubernetes: true
      mail: true
      vpn: true
      cve_enrichment: true
      confidence_scoring: true
      false_positive_scoring: true
    reports:
      - json

  internal-vapt:
    description: Internal authorized review with full active checks.
    context: internal
    validation_level: full
    nmap_steps:
      - discovery
      - tcp_top_1000
      - tcp_full
      - tcp_services
    modules:
      tls: true
      http: true
      exposure: true
      plaintext: true
      smb_safe: true
      ldap: true
      ssh: true
      rdp: true
      winrm: true
      ftp: true
      snmp: true
      dns: true
      ntp: true
      database: true
      devops: true
      kubernetes: true
      mail: true
      vpn: true
      cve_enrichment: true
      confidence_scoring: true
      false_positive_scoring: true
    reports:
      - json

  external-vapt:
    description: External perimeter review with full active checks.
    context: external
    validation_level: full
    nmap_steps:
      - discovery
      - tcp_top_1000
      - tcp_services
    modules:
      tls: true
      http: true
      exposure: true
      plaintext: true
      smb_safe: false
      ldap: false
      ssh: true
      rdp: true
      winrm: true
      ftp: true
      snmp: true
      dns: true
      ntp: true
      database: true
      devops: true
      kubernetes: true
      mail: true
      vpn: true
      cve_enrichment: true
      confidence_scoring: true
      false_positive_scoring: true
    reports:
      - json

  full-vapt:
    description: Full VAPT — discovery, full port scan, fingerprinting, all module checks, active web crawl, CVE mapping. Same command works internal or external.
    context: unknown
    validation_level: full
    nmap_steps:
      - discovery
      - tcp_top_1000
      - tcp_full
      - tcp_services
      - udp_top_1000
      - udp_services
    scan_features:
      tcp_top_1000: true
      tcp_full_port_scan: true
      tcp_service_detection: true
      udp_top_1000: true
      service_fingerprinting: true
    modules:
      tls: true
      http: true
      smb_safe: true
      ldap: true
      ssh: true
      rdp: true
      winrm: true
      ftp: true
      snmp: true
      dns: true
      ntp: true
      database: true
      devops: true
      kubernetes: true
      mail: true
      vpn: true
      exposure: true
      plaintext: true
      cve_enrichment: true
      confidence_scoring: true
      false_positive_scoring: true
    reports:
      - json
      - html
      - csv

  offline-analysis:
    description: Parse existing Nmap XML and produce normalized findings without active scanning.
    context: unknown
    nmap_steps: []
    modules:
      tls: false
      http: false
      exposure: true
      plaintext: true
      smb_safe: false
      cve_enrichment: false
      confidence_scoring: true
      false_positive_scoring: true
    reports:
      - json
